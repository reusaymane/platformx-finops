version: "3.9"

services:

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: platformx-timescaledb
    environment:
      POSTGRES_USER: platformx
      POSTGRES_PASSWORD: platformx
      POSTGRES_DB: finops
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platformx -d finops"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: platformx-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: platformx-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./scripts/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"

  grafana:
    image: grafana/grafana:latest
    container_name: platformx-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  data-collector:
    build:
      context: ./services/data-collector
      dockerfile: Dockerfile
    container_name: platformx-collector
    environment:
      DATABASE_URL: postgres://platformx:platformx@timescaledb:5432/finops?sslmode=disable
      PROMETHEUS_URL: http://prometheus:9090
      AWS_REGION: eu-west-3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-fake}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-fake}
      FAKE_MODE: "true"          # use simulated data when no real AWS creds
      COLLECT_INTERVAL: "60s"
      LOG_LEVEL: info
    ports:
      - "8081:8080"
    depends_on:
      timescaledb:
        condition: service_healthy
      prometheus:
        condition: service_started
    restart: unless-stopped

  cost-analyzer:
    build:
      context: ./services/cost-analyzer
      dockerfile: Dockerfile
    container_name: platformx-analyzer
    environment:
      DATABASE_URL: postgres://platformx:platformx@timescaledb:5432/finops?sslmode=disable
      PORT: "8080"
      LOG_LEVEL: info
    ports:
      - "8082:8080"
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  recommendation-engine:
    build:
      context: ./services/recommendation-engine
      dockerfile: Dockerfile
    container_name: platformx-reco
    environment:
      DATABASE_URL: postgres://platformx:platformx@timescaledb:5432/finops?sslmode=disable
      COST_ANALYZER_URL: http://cost-analyzer:8080
      PORT: "8080"
      LOG_LEVEL: info
    ports:
      - "8083:8080"
    depends_on:
      - cost-analyzer
    restart: unless-stopped

  anomaly-detection:
    build:
      context: ./services/anomaly-detection
      dockerfile: Dockerfile
    container_name: platformx-anomaly
    environment:
      DATABASE_URL: postgres://platformx:platformx@timescaledb:5432/finops?sslmode=disable
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      ZSCORE_THRESHOLD: "2.5"
      PORT: "8080"
      LOG_LEVEL: info
    ports:
      - "8084:8080"
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  budget-alert:
    build:
      context: ./services/budget-alert
      dockerfile: Dockerfile
    container_name: platformx-budget
    environment:
      DATABASE_URL: postgres://platformx:platformx@timescaledb:5432/finops?sslmode=disable
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      PORT: "8080"
      LOG_LEVEL: info
    ports:
      - "8085:8080"
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  ml-forecasting:
    build:
      context: ./services/ml-forecasting
      dockerfile: Dockerfile
    container_name: platformx-ml
    environment:
      DATABASE_URL: postgres://platformx:platformx@timescaledb:5432/finops?sslmode=disable
      PORT: "8000"
      LOG_LEVEL: info
    ports:
      - "8086:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  timescale_data:
  grafana_data:
